<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VICION TV PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-light: #151515;
            --accent: #39ff14;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #222222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- PLAYER AREA (Fixed Top) --- */
        #player-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
            z-index: 100;
        }
        video { width: 100%; height: 100%; }

        /* --- CONTENT AREA (Scrollable) --- */
        #main-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- AUDIO SELECTOR --- */
        #audio-controls {
            padding: 10px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: none;
            gap: 10px;
            align-items: center;
        }
        .audio-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .audio-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: bold;
        }

        /* --- SEARCH & CATEGORIES --- */
        .search-box {
            padding: 10px 20px;
        }
        #search {
            width: 100%;
            background: var(--surface-light);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            outline: none;
        }

        /* --- CHANNEL LIST --- */
        #channel-list {
            padding: 10px 20px;
        }
        .channel-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--surface);
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .channel-item:active { background: var(--surface-light); }
        .channel-item.active { border-color: var(--accent); }

        .ch-img {
            width: 50px; height: 50px;
            object-fit: contain;
            margin-right: 15px;
            background: #000;
            border-radius: 5px;
        }
        .ch-info .name { font-weight: bold; font-size: 16px; display: block; }
        .ch-info .cat { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-top: 4px; display: block; }

        /* Custom Scrollbar */
        #main-content::-webkit-scrollbar { width: 4px; }
        #main-content::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

    <div id="player-container" class="shaka-video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="main-content">
        <header>
            <div class="logo">Vicion TV</div>
            <div id="status-signal" style="color: var(--accent); font-size: 10px;">● SEÑAL ACTIVA</div>
        </header>

        <div id="audio-controls">
            <span style="font-size: 11px; color: var(--text-dim);">AUDIO:</span>
            <div id="audio-list" style="display: flex; gap: 5px;"></div>
        </div>

        <div class="search-box">
            <input type="text" id="search" placeholder="Buscar canal...">
        </div>

        <div id="channel-list"></div>
    </div>

<script>
    let player, video, ui;
    const CHANNELS = [
        { name: "ESPN 3", uri: "https://storage.googleapis.com/shaka-demo-assets/sintel/dash.mpd", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/ESPN3_logo.svg/300px-ESPN3_logo.svg.png", cat: "Deportes" },
        { name: "TVE Internacional", uri: "https://ztnr.rtve.es/ztnr/1688877.m3u8", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/TVE_Internacional_2008.svg/240px-TVE_Internacional_2008.svg.png", cat: "General" }
    ];

    async function init() {
        video = document.getElementById('video');
        player = new shaka.Player(video);
        
        // UI de Shaka (necesario para controles nativos y multi-idioma)
        const container = document.getElementById('player-container');
        ui = new shaka.ui.Overlay(player, container, video);

        player.addEventListener('trackschanged', updateAudioTracks);

        renderChannels(CHANNELS);
    }

    function renderChannels(list) {
        const container = document.getElementById('channel-list');
        container.innerHTML = '';
        list.forEach(ch => {
            const el = document.createElement('div');
            el.className = 'channel-item';
            el.innerHTML = `
                <img src="${ch.logo}" class="ch-img">
                <div class="ch-info">
                    <span class="name">${ch.name}</span>
                    <span class="cat">${ch.cat}</span>
                </div>
            `;
            el.onclick = () => loadChannel(ch.uri, el);
            container.appendChild(el);
        });
    }

    async function loadChannel(uri, element) {
        try {
            await player.load(uri);
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        } catch (e) { console.error("Error cargando canal", e); }
    }

    function updateAudioTracks() {
        const audioList = document.getElementById('audio-list');
        const audioSection = document.getElementById('audio-controls');
        const tracks = player.getTracks().filter(t => t.type === 'audio');

        audioList.innerHTML = '';
        if (tracks.length > 1) {
            audioSection.style.display = 'flex';
            tracks.forEach(track => {
                const btn = document.createElement('button');
                btn.className = `audio-btn ${track.active ? 'active' : ''}`;
                btn.innerText = track.language.toUpperCase() || 'N/A';
                btn.onclick = () => {
                    player.selectTrack(track, true);
                    updateAudioTracks();
                };
                audioList.appendChild(btn);
            });
        } else {
            audioSection.style.display = 'none';
        }
    }

    document.getElementById('search').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = CHANNELS.filter(c => c.name.toLowerCase().includes(val));
        renderChannels(filtered);
    };

    document.addEventListener('shaka-ui-loaded', init);
    document.addEventListener('DOMContentLoaded', () => {
        if (!window['shaka']) return; 
        shaka.polyfill.installAll();
    });
</script>
</body>
</html>
