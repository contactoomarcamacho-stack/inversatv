<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICION TV - Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <style>
        :root { 
            --bg: #000000; --panel: #0a0a0a; --accent: #39ff14; 
            --text: #ffffff; --text-dim: #a0a0a0;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        header {
            background: var(--panel); padding: 10px; text-align: center;
            border-bottom: 2px solid var(--accent); box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); letter-spacing: 3px; }

        #main-container { display: flex; flex: 1; overflow: hidden; }

        #sidebar { 
            width: 280px; background: var(--panel); border-right: 1px solid #1a1a1a; 
            overflow-y: auto; padding: 15px; display: flex; flex-direction: column;
        }

        .search-box {
            width: 100%; padding: 10px; margin-bottom: 15px;
            background: #111; border: 1px solid #333; color: white; border-radius: 5px; outline: none;
        }
        .search-box:focus { border-color: var(--accent); }

        .category-item { 
            padding: 10px 15px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; 
            transition: 0.3s; font-size: 14px; color: var(--text-dim);
        }
        .category-item.active { background: rgba(57, 255, 20, 0.1); color: var(--accent); font-weight: bold; }

        #content { flex: 1; display: flex; flex-direction: column; }
        #player-wrapper { background: #000; width: 100%; position: relative; padding-top: 56.25%; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }

        #channel-grid { flex: 1; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; overflow-y: auto; }

        .channel-card { 
            background: var(--panel); padding: 10px; border-radius: 12px; text-align: center; 
            cursor: pointer; position: relative; border: 1px solid #1a1a1a; transition: 0.2s;
        }
        .channel-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .channel-card img { width: 100%; height: 50px; object-fit: contain; margin-bottom: 8px; }
        .channel-card p { margin: 0; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .fav-btn {
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6);
            border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; border-radius: 50%;
        }
        .fav-btn.is-fav { color: var(--accent); }

        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #sidebar { width: 100%; height: auto; max-height: 200px; border-right: none; }
            .category-list-wrapper { display: flex; overflow-x: auto; gap: 10px; }
            .category-item { white-space: nowrap; }
        }
    </style>
</head>
<body>

<header><h1>VICION TV</h1></header>

<div id="main-container">
    <div id="sidebar">
        <input type="text" class="search-box" placeholder="Buscar canal..." id="search">
        <div id="categories-list" class="category-list-wrapper"></div>
    </div>
    <div id="content">
        <div id="player-wrapper"><video id="video" controls autoplay></video></div>
        <div id="channel-grid"></div>
    </div>
</div>

<script>
    let player, videoElement, fullData = [];
    let favorites = JSON.parse(localStorage.getItem('vicion_favs')) || [];
    let currentCat = 0;

    async function initApp() {
        videoElement = document.getElementById('video');
        shaka.polyfill.installAll();
        player = new shaka.Player(videoElement);

        try {
            const response = await fetch('channels.json');
            const data = await response.json();
            // Insertar categoría favoritos al inicio
            fullData = [{ name: "⭐ FAVORITOS", samples: [] }, ...data];
            updateFavsCategory();
            renderCategories();
            
            // Recordar último canal
            const lastChannel = JSON.parse(localStorage.getItem('vicion_last_path'));
            if(lastChannel) playChannel(lastChannel);

            loadCategory(0);
        } catch (e) { console.error("Error inicializando"); }

        document.getElementById('search').addEventListener('input', (e) => filterChannels(e.target.value));
    }

    function updateFavsCategory() {
        fullData[0].samples = favorites;
    }

    function renderCategories() {
        const container = document.getElementById('categories-list');
        container.innerHTML = '';
        fullData.forEach((cat, i) => {
            const div = document.createElement('div');
            div.className = `category-item ${i===currentCat?'active':''}`;
            div.innerText = cat.name;
            div.onclick = () => loadCategory(i, div);
            container.appendChild(div);
        });
    }

    function loadCategory(index) {
        currentCat = index;
        renderCategories();
        renderChannels(fullData[index].samples);
    }

    function renderChannels(channels) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = '';
        channels.forEach(ch => {
            const isFav = favorites.some(f => f.uri === ch.uri);
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <button class="fav-btn ${isFav?'is-fav':''}" onclick="toggleFav(event, '${ch.uri}')">★</button>
                <img src="${ch.icono}" onerror="this.src='https://via.placeholder.com/100/000/39ff14?text=TV'">
                <p>${ch.name}</p>
            `;
            card.onclick = () => playChannel(ch);
            grid.appendChild(card);
        });
    }

    function toggleFav(event, uri) {
        event.stopPropagation();
        // Buscar el canal en toda la data
        let channelObj;
        fullData.forEach(cat => {
            const found = cat.samples.find(s => s.uri === uri);
            if(found) channelObj = found;
        });

        const index = favorites.findIndex(f => f.uri === uri);
        if(index > -1) favorites.splice(index, 1);
        else favorites.push(channelObj);

        localStorage.setItem('vicion_favs', JSON.stringify(favorites));
        updateFavsCategory();
        loadCategory(currentCat);
    }

    async function playChannel(channel) {
        localStorage.setItem('vicion_last_path', JSON.stringify(channel));
        player.configure({ drm: { clearKeys: {} } });
        if (channel.drm_license_uri) {
            const [id, key] = channel.drm_license_uri.split(':');
            player.configure({ drm: { clearKeys: { [id]: key } } });
        }
        try {
            await player.load(channel.uri);
            videoElement.play();
        } catch (e) { console.error("Error de carga"); }
    }

    function filterChannels(term) {
        const filtered = fullData[currentCat].samples.filter(ch => ch.name.toLowerCase().includes(term.toLowerCase()));
        renderChannels(filtered);
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
