<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIPTV Web Player - Prototipo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --accent: #e50914; --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar de Categorías */
        #sidebar { width: 250px; background: var(--panel); border-right: 1px solid #333; overflow-y: auto; padding: 10px; }
        .category-item { padding: 12px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; transition: 0.3s; font-size: 14px; }
        .category-item:hover { background: #333; }
        .category-item.active { background: var(--accent); font-weight: bold; }

        /* Contenedor Principal */
        #main { flex: 1; display: flex; flex-direction: column; }
        
        /* Reproductor */
        #player-wrapper { background: #000; width: 100%; height: 50vh; display: flex; align-items: center; justify-content: center; }
        video { height: 100%; max-width: 100%; outline: none; }

        /* Grilla de Canales */
        #channel-grid { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; overflow-y: auto; background: var(--bg); }
        .channel-card { background: var(--panel); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .channel-card:hover { transform: scale(1.05); border-color: var(--accent); }
        .channel-card img { width: 100%; height: 70px; object-fit: contain; margin-bottom: 8px; }
        .channel-card p { margin: 0; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="text-align: center;">Categorías</h3>
    <div id="categories-list"></div>
</div>

<div id="main">
    <div id="player-wrapper">
        <video id="video" controls autoplay></video>
    </div>
    <div id="channel-grid"></div>
</div>

<script>
    let player;
    let videoElement;
    let fullData = [];

    async function initApp() {
        videoElement = document.getElementById('video');
        shaka.polyfill.installAll();
        player = new shaka.Player(videoElement);

        // Error handling
        player.addEventListener('error', (event) => console.error('Error de Shaka:', event.detail));

        try {
            // Cargamos tu archivo JSON
            const response = await fetch('channels.json');
            fullData = await response.json();
            renderCategories();
            // Cargar primera categoría por defecto
            if(fullData.length > 0) loadCategory(0);
        } catch (e) {
            alert("No se pudo cargar el archivo channels.json. Asegúrate de que esté en la misma carpeta.");
        }
    }

    function renderCategories() {
        const container = document.getElementById('categories-list');
        fullData.forEach((cat, index) => {
            const div = document.createElement('div');
            div.className = 'category-item';
            div.innerText = cat.name;
            div.onclick = () => loadCategory(index, div);
            container.appendChild(div);
        });
    }

    function loadCategory(index, element) {
        // UI Update
        document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');

        const grid = document.getElementById('channel-grid');
        grid.innerHTML = '';
        
        const category = fullData[index];
        category.samples.forEach(channel => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <img src="${channel.icono}" onerror="this.src='https://via.placeholder.com/100?text=TV'">
                <p>${channel.name}</p>
            `;
            card.onclick = () => playChannel(channel);
            grid.appendChild(card);
        });
    }

    async function playChannel(channel) {
        // Configuración de ClearKey DRM
        if (channel.drm_license_uri) {
            const [keyId, key] = channel.drm_license_uri.split(':');
            player.configure({
                drm: {
                    clearKeys: { [keyId]: key }
                }
            });
        } else {
            player.configure({ drm: { clearKeys: {} } }); // Limpiar llaves si no tiene
        }

        try {
            await player.load(channel.uri);
            videoElement.play();
        } catch (e) {
            console.error('Error cargando canal:', e);
            alert("Error al reproducir este canal. Puede ser por restricciones de red (CORS) o enlace caído.");
        }
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
