<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICION TV - Premium Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --panel: #0a0a0a; 
            --accent: #39ff14; /* Verde Neón */
            --text: #ffffff; 
            --text-dim: #a0a0a0;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
        }

        /* Pantalla de Carga (Splash) */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
            transition: opacity 0.6s ease;
        }
        #splash.hidden { opacity: 0; pointer-events: none; }

        .loader-bar {
            width: 200px; height: 2px;
            background: #1a1a1a;
            margin-top: 20px;
            position: relative; overflow: hidden;
        }
        .loader-progress {
            width: 0%; height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: loading 2s infinite;
        }
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        /* Header */
        header {
            background: var(--panel);
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
        header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }

        /* Contenedor Principal */
        #main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        #sidebar { 
            width: 280px; background: var(--panel); border-right: 1px solid #1a1a1a; 
            overflow-y: auto; padding: 15px; display: flex; flex-direction: column;
        }

        .search-box {
            width: 100%; padding: 10px; margin-bottom: 15px;
            background: #111; border: 1px solid #333; color: white; border-radius: 5px; outline: none;
        }
        .search-box:focus { border-color: var(--accent); }

        .category-item { 
            padding: 12px 15px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; 
            transition: 0.3s; font-size: 14px; color: var(--text-dim);
        }
        .category-item:hover { background: #111; color: var(--text); }
        .category-item.active { 
            background: rgba(57, 255, 20, 0.1); color: var(--accent); font-weight: bold;
        }

        /* Reproductor y Grilla */
        #content { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        
        #player-wrapper { background: #000; width: 100%; position: relative; padding-top: 56.25%; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }

        #channel-grid { 
            flex: 1; padding: 15px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 12px; overflow-y: auto; 
        }

        .channel-card { 
            background: var(--panel); padding: 10px; border-radius: 12px; 
            text-align: center; cursor: pointer; transition: 0.2s; 
            border: 1px solid #1a1a1a; position: relative;
        }
        .channel-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .channel-card img { width: 100%; height: 55px; object-fit: contain; margin-bottom: 8px; }
        .channel-card p { margin: 0; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .fav-btn {
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7);
            border: none; color: #444; cursor: pointer; font-size: 18px; border-radius: 50%;
            width: 25px; height: 25px; line-height: 25px; padding: 0;
        }
        .fav-btn.is-fav { color: var(--accent); }

        /* Móvil */
        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #sidebar { 
                width: 100%; height: auto; max-height: 180px; border-right: none; 
                border-bottom: 1px solid #1a1a1a; 
            }
            .category-list-wrapper { display: flex; overflow-x: auto; gap: 8px; }
            .category-item { white-space: nowrap; padding: 8px 15px; }
            #channel-grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); }
        }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="color: #39ff14; letter-spacing: 8px; margin-bottom: 0;">VICION TV</h1>
    <div class="loader-bar"><div class="loader-progress"></div></div>
    <p id="status-text" style="color: #444; font-size: 10px; margin-top: 15px; text-transform: uppercase;">Iniciando Sistema...</p>
</div>

<header>
    <h1>VICION TV</h1>
</header>

<div id="main-container">
    <div id="sidebar">
        <input type="text" class="search-box" placeholder="🔍 Buscar canal..." id="search">
        <div id="categories-list" class="category-list-wrapper"></div>
    </div>

    <div id="content">
        <div id="player-wrapper">
            <video id="video" controls autoplay></video>
        </div>
        <div id="channel-grid"></div>
    </div>
</div>

<script>
    let player, videoElement, fullData = [];
    let favorites = JSON.parse(localStorage.getItem('vicion_favs')) || [];
    let currentCatIndex = 0;

    async function initApp() {
        videoElement = document.getElementById('video');
        const status = document.getElementById('status-text');
        
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            alert("Tu navegador no soporta este reproductor.");
            return;
        }

        player = new shaka.Player(videoElement);
        player.addEventListener('error', (e) => console.error('Error de Shaka:', e.detail));

        try {
            status.innerText = "Cargando lista de canales...";
            // Añadimos un prevent cache para GitHub
            const response = await fetch('channels.json?v=' + Date.now());
            if (!response.ok) throw new Error("No se pudo obtener el JSON");
            
            const data = await response.json();
            
            // Estructura de datos con Favoritos siempre al principio
            fullData = [{ name: "⭐ FAVORITOS", samples: [] }, ...data];
            syncFavorites();
            renderCategories();

            // Quitar Splash
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
            }, 1500);

            // Recordar último canal
            const last = JSON.parse(localStorage.getItem('vicion_last'));
            if(last) playChannel(last);

            loadCategory(0);

        } catch (e) {
            status.innerText = "ERROR AL CARGAR DATOS";
            status.style.color = "red";
            console.error(e);
        }

        document.getElementById('search').addEventListener('input', (e) => filterChannels(e.target.value));
    }

    function syncFavorites() {
        fullData[0].samples = favorites;
    }

    function renderCategories() {
        const container = document.getElementById('categories-list');
        container.innerHTML = '';
        fullData.forEach((cat, i) => {
            const div = document.createElement('div');
            div.className = `category-item ${i === currentCatIndex ? 'active' : ''}`;
            div.innerText = cat.name;
            div.onclick = () => loadCategory(i);
            container.appendChild(div);
        });
    }

    function loadCategory(index) {
        currentCatIndex = index;
        renderCategories();
        renderChannels(fullData[index].samples);
    }

    function renderChannels(channels) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = '';
        channels.forEach(ch => {
            const isFav = favorites.some(f => f.uri === ch.uri);
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <button class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFav(event, '${ch.uri}')">★</button>
                <img src="${ch.icono}" onerror="this.src='https://via.placeholder.com/100/000/39ff14?text=TV'">
                <p>${ch.name}</p>
            `;
            card.onclick = () => playChannel(ch);
            grid.appendChild(card);
        });
    }

    function toggleFav(event, uri) {
        event.stopPropagation();
        let channelObj;
        // Buscar el objeto en toda la lista
        fullData.forEach(c => {
            const found = c.samples.find(s => s.uri === uri);
            if(found) channelObj = found;
        });

        const index = favorites.findIndex(f => f.uri === uri);
        if(index > -1) {
            favorites.splice(index, 1);
        } else if(channelObj) {
            favorites.push(channelObj);
        }

        localStorage.setItem('vicion_favs', JSON.stringify(favorites));
        syncFavorites();
        loadCategory(currentCatIndex);
    }

    async function playChannel(channel) {
        localStorage.setItem('vicion_last', JSON.stringify(channel));
        
        // Limpiar configuración DRM previa
        player.configure({ drm: { clearKeys: {} } });

        if (channel.drm_license_uri) {
            const [id, key] = channel.drm_license_uri.split(':');
            player.configure({ drm: { clearKeys: { [id]: key } } });
        }

        try {
            await player.load(channel.uri);
            videoElement.play();
            if(window.innerWidth < 768) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        } catch (e) {
            console.error("Error cargando stream");
        }
    }

    function filterChannels(term) {
        const filtered = fullData[currentCatIndex].samples.filter(ch => 
            ch.name.toLowerCase().includes(term.toLowerCase())
        );
        renderChannels(filtered);
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
