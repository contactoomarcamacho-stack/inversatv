<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vicion TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <style>
        :root {
            --black: #000000;
            --dark: #060a06;
            --panel: #0b120b;
            --surface: #101a10;
            --surface2: #162416;
            --green: #00ff41;
            --green-dim: #00cc33;
            --green-glow: rgba(0, 255, 65, 0.15);
            --green-border: rgba(0, 255, 65, 0.25);
            --green-muted: rgba(0, 255, 65, 0.6);
            --text: #e8f5e8;
            --text-dim: #7aad7a;
            --text-muted: #3d7a3d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 100;
        }

        /* Grid noise background */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── HEADER ─── */
        #header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--black);
            border-bottom: 1px solid var(--green-border);
            flex-shrink: 0;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 4px;
            color: var(--green);
            text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,65,0.3);
        }

        .logo span { color: var(--text-dim); font-weight: 400; }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
        }

        .pulse-dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* ─── VIDEO PLAYER ─── */
        #player-section {
            position: relative;
            z-index: 10;
            background: #000;
            flex-shrink: 0;
            border-bottom: 2px solid var(--green-border);
        }

        #player-section::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            box-shadow: 0 0 15px var(--green);
        }

        #video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* No signal overlay */
        #no-signal {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            gap: 10px;
        }

        .signal-icon {
            font-size: 36px;
            opacity: 0.3;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 95%, 100% { opacity: 0.3; }
            96% { opacity: 0.1; }
            97% { opacity: 0.4; }
            98% { opacity: 0.1; }
            99% { opacity: 0.3; }
        }

        .signal-text {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 3px;
        }

        /* Now playing bar */
        #now-playing {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            background: var(--panel);
            min-height: 42px;
        }

        .np-logo {
            width: 28px; height: 28px;
            border-radius: 4px;
            object-fit: contain;
            background: var(--surface);
            flex-shrink: 0;
            border: 1px solid var(--green-border);
        }

        .np-info { flex: 1; overflow: hidden; }

        .np-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--green);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }

        .np-label {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
        }

        .np-live {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            padding: 3px 7px;
            background: rgba(0,255,65,0.1);
            border: 1px solid var(--green-border);
            color: var(--green);
            border-radius: 3px;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        /* ─── MAIN CONTENT AREA ─── */
        #content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        /* ─── CATEGORY TABS ─── */
        #cat-tabs-wrap {
            flex-shrink: 0;
            background: var(--black);
            border-bottom: 1px solid var(--green-border);
            overflow-x: auto;
            scrollbar-width: none;
        }

        #cat-tabs-wrap::-webkit-scrollbar { display: none; }

        #cat-tabs {
            display: flex;
            gap: 0;
            padding: 0 8px;
            min-width: max-content;
        }

        .cat-tab {
            padding: 10px 16px;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
            position: relative;
            text-transform: uppercase;
        }

        .cat-tab:hover { color: var(--green-dim); }

        .cat-tab.active {
            color: var(--green);
            border-bottom-color: var(--green);
            text-shadow: 0 0 10px rgba(0,255,65,0.5);
        }

        /* ─── SEARCH BAR ─── */
        #search-wrap {
            flex-shrink: 0;
            padding: 10px 12px;
            background: var(--panel);
            border-bottom: 1px solid rgba(0,255,65,0.08);
        }

        #search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--green-border);
            border-radius: 6px;
            padding: 9px 14px 9px 36px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #search-input:focus {
            border-color: var(--green-dim);
            box-shadow: 0 0 12px var(--green-glow);
        }

        #search-input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        #search-wrap { position: relative; }

        /* ─── CHANNEL GRID ─── */
        #channel-grid {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            align-content: start;
            scrollbar-width: thin;
            scrollbar-color: var(--green-border) transparent;
        }

        #channel-grid::-webkit-scrollbar { width: 3px; }
        #channel-grid::-webkit-scrollbar-track { background: transparent; }
        #channel-grid::-webkit-scrollbar-thumb { background: var(--green-border); border-radius: 2px; }

        .channel-card {
            background: var(--surface);
            border: 1px solid rgba(0,255,65,0.1);
            border-radius: 8px;
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.3s ease both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .channel-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--green-glow), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .channel-card:active { transform: scale(0.94); }
        .channel-card:active::before, .channel-card.active::before { opacity: 1; }

        .channel-card.active {
            border-color: var(--green-dim);
            box-shadow: 0 0 16px var(--green-glow), inset 0 0 20px rgba(0,255,65,0.05);
        }

        .channel-card.active .ch-name { color: var(--green); }

        .ch-logo-wrap {
            width: 52px; height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(0,255,65,0.08);
        }

        .ch-logo {
            width: 100%; height: 100%;
            object-fit: contain;
            padding: 3px;
        }

        .ch-name {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-dim);
            text-align: center;
            line-height: 1.3;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            letter-spacing: 0.3px;
            width: 100%;
        }

        /* Loading state */
        .ch-logo.loading { opacity: 0.4; }

        /* ─── EMPTY STATE ─── */
        #empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        #empty-state .empty-icon { font-size: 40px; opacity: 0.3; }

        #empty-state p {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-align: center;
        }

        /* ─── LOADING OVERLAY ─── */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            gap: 20px;
            transition: opacity 0.5s;
        }

        #loader.hidden { opacity: 0; pointer-events: none; }

        .loader-logo {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 32px;
            letter-spacing: 6px;
            color: var(--green);
            text-shadow: 0 0 30px var(--green), 0 0 60px rgba(0,255,65,0.4);
            animation: glow-pulse 2s infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,65,0.3); }
            50% { text-shadow: 0 0 40px var(--green), 0 0 80px rgba(0,255,65,0.5), 0 0 120px rgba(0,255,65,0.2); }
        }

        .loader-bar-wrap {
            width: 200px;
            height: 2px;
            background: var(--surface2);
            border-radius: 1px;
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: load-progress 1.5s ease-out forwards;
        }

        @keyframes load-progress {
            from { width: 0%; }
            to { width: 100%; }
        }

        .loader-text {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--text-muted);
        }

        /* ─── TOAST ─── */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--surface2);
            border: 1px solid var(--green-border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 12px;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            z-index: 200;
            transition: transform 0.3s;
            box-shadow: 0 0 20px var(--green-glow);
            white-space: nowrap;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ─── BUFFERING INDICATOR ─── */
        #buffering {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            z-index: 5;
        }

        #buffering.show { display: flex; }

        .spin-ring {
            width: 36px; height: 36px;
            border: 2px solid rgba(0,255,65,0.2);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 15px var(--green-glow);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-logo">VICION<span style="color:var(--text-dim);font-weight:400"> TV</span></div>
    <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
    <div class="loader-text">INICIANDO SISTEMA...</div>
</div>

<!-- HEADER -->
<div id="header">
    <div class="logo">VICION<span> TV</span></div>
    <div class="header-status">
        <div class="pulse-dot"></div>
        <span id="channel-count">—</span>
    </div>
</div>

<!-- VIDEO PLAYER -->
<div id="player-section">
    <div id="video-container">
        <div id="no-signal">
            <div class="signal-icon">📺</div>
            <div class="signal-text">SIN SEÑAL</div>
        </div>
        <div id="buffering"><div class="spin-ring"></div></div>
        <video id="video" controls playsinline></video>
    </div>
    <div id="now-playing">
        <img class="np-logo" id="np-logo" src="" alt="">
        <div class="np-info">
            <div class="np-name" id="np-name">Seleccioná un canal</div>
            <div class="np-label">NOW PLAYING</div>
        </div>
        <div class="np-live">LIVE</div>
    </div>
</div>

<!-- CONTENT -->
<div id="content-area">
    <!-- Category Tabs -->
    <div id="cat-tabs-wrap">
        <div id="cat-tabs"></div>
    </div>

    <!-- Search -->
    <div id="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="search-input" placeholder="Buscar canal...">
    </div>

    <!-- Grid -->
    <div id="channel-grid"></div>
    <div id="empty-state">
        <div class="empty-icon">📡</div>
        <p>SIN RESULTADOS</p>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
    let player, videoElement;
    let fullData = [];
    let currentCatIndex = 0;
    let activeCard = null;

    async function initApp() {
        videoElement = document.getElementById('video');
        shaka.polyfill.installAll();
        player = new shaka.Player(videoElement);
        player.addEventListener('error', e => console.error('Shaka error:', e.detail));
        player.addEventListener('buffering', e => {
            document.getElementById('buffering').classList.toggle('show', e.buffering);
        });

        try {
            const res = await fetch('channels.json');
            fullData = await res.json();
            renderCategories();
            if (fullData.length > 0) loadCategory(0);
        } catch (e) {
            showToast('ERROR: No se pudo cargar channels.json');
        }

        // Hide loader after delay
        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
        }, 1600);

        // Search
        document.getElementById('search-input').addEventListener('input', e => {
            filterChannels(e.target.value.trim());
        });
    }

    function renderCategories() {
        const tabs = document.getElementById('cat-tabs');
        let total = 0;
        fullData.forEach((cat, i) => {
            total += (cat.samples || cat.muestras)?.length || 0;
            const tab = document.createElement('div');
            tab.className = 'cat-tab' + (i === 0 ? ' active' : '');
            tab.textContent = cat.name;
            tab.dataset.index = i;
            tab.onclick = () => selectCategory(i);
            tabs.appendChild(tab);
        });
        document.getElementById('channel-count').textContent = total + ' CH';
    }

    function selectCategory(index) {
        document.querySelectorAll('.cat-tab').forEach((t, i) => {
            t.classList.toggle('active', i === index);
        });
        // Scroll tab into view
        document.querySelectorAll('.cat-tab')[index]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        currentCatIndex = index;
        document.getElementById('search-input').value = '';
        loadCategory(index);
    }

    function loadCategory(index) {
        const cat = fullData[index];
        if (!cat) return;
        renderChannels(cat.samples || cat.muestras || []);
    }

    function renderChannels(channels) {
        const grid = document.getElementById('channel-grid');
        const empty = document.getElementById('empty-state');
        grid.innerHTML = '';

        if (!channels.length) {
            grid.style.display = 'none';
