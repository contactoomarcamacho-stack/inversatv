<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICION TV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --panel: #0a0a0a; 
            --accent: #39ff14; 
            --text: #ffffff; 
            --text-dim: #888888;
            --line: #1a1a1a;
        }

        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000; transition: 0.5s;
        }
        #splash.hidden { opacity: 0; pointer-events: none; }

        header { background: var(--panel); padding: 10px; text-align: center; border-bottom: 1px solid var(--line); }
        header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 3px; color: var(--accent); }

        /* Contenedor Video Fijo arriba */
        #player-wrapper { background: #000; width: 100%; position: relative; padding-top: 56.25%; border-bottom: 2px solid var(--accent); }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Tabs de Navegación (Canales / Favoritos) */
        .tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--line); }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; color: var(--text-dim); cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Categorías Horizontales */
        #categories-list { 
            display: flex; overflow-x: auto; background: #050505; padding: 10px; gap: 8px; 
            border-bottom: 1px solid var(--line); scrollbar-width: none;
        }
        #categories-list::-webkit-scrollbar { display: none; }
        .category-item { 
            padding: 6px 15px; border-radius: 20px; background: #151515; color: var(--text-dim); 
            white-space: nowrap; font-size: 12px; border: 1px solid #222;
        }
        .category-item.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }

        /* LISTA DE CANALES (Estilo pedido) */
        #channel-grid { flex: 1; overflow-y: auto; background: var(--bg); }

        .channel-row { 
            display: flex; align-items: center; padding: 10px 15px; 
            border-bottom: 1px solid var(--line); transition: 0.2s; cursor: pointer;
        }
        .channel-row:active { background: #111; }
        
        .channel-number { width: 40px; color: var(--accent); font-family: monospace; font-size: 14px; font-weight: bold; }
        
        .channel-logo { width: 35px; height: 35px; object-fit: contain; margin-right: 15px; border-radius: 4px; }
        
        .channel-info { flex: 1; min-width: 0; }
        .channel-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-sub { font-size: 11px; color: var(--text-dim); }

        .fav-star { padding: 10px; color: #333; font-size: 18px; }
        .fav-star.is-fav { color: var(--accent); }

        /* Buscador */
        .search-container { padding: 10px; background: var(--panel); }
        .search-box { 
            width: 100%; padding: 8px 12px; background: #1a1a1a; border: 1px solid #333; 
            border-radius: 6px; color: white; outline: none; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="color: #39ff14; letter-spacing: 5px;">VICION TV</h1>
    <p style="color: #444; font-size: 10px; margin-top: 10px;">CARGANDO...</p>
</div>

<header><h1>VICION TV</h1></header>

<div id="player-wrapper">
    <video id="video" controls autoplay></video>
</div>

<div class="tabs">
    <div class="tab active" onclick="showSection('channels')">Canales</div>
    <div class="tab" onclick="showSection('favs')">Favoritos</div>
</div>

<div class="search-container">
    <input type="text" class="search-box" placeholder="Buscar canal..." id="search">
</div>

<div id="categories-list"></div>

<div id="channel-grid"></div>

<script>
    let player, videoElement, fullData = [];
    let favorites = JSON.parse(localStorage.getItem('vicion_favs')) || [];
    let currentCat = 0;
    let showingFavs = false;

    async function initApp() {
        videoElement = document.getElementById('video');
        shaka.polyfill.installAll();
        player = new shaka.Player(videoElement);

        try {
            const response = await fetch('channels.json?v=' + Date.now());
            fullData = await response.json();
            
            renderCategories();
            loadCategory(0);

            // Recordar último
            const last = JSON.parse(localStorage.getItem('vicion_last'));
            if(last) playChannel(last);

            setTimeout(() => document.getElementById('splash').classList.add('hidden'), 1000);
        } catch (e) { alert("Error al cargar canales."); }

        document.getElementById('search').addEventListener('input', (e) => filterChannels(e.target.value));
    }

    function renderCategories() {
        const container = document.getElementById('categories-list');
        container.innerHTML = '';
        fullData.forEach((cat, i) => {
            const div = document.createElement('div');
            div.className = `category-item ${i === currentCat ? 'active' : ''}`;
            div.innerText = cat.name;
            div.onclick = () => { showingFavs = false; loadCategory(i); };
            container.appendChild(div);
        });
    }

    function loadCategory(index) {
        currentCat = index;
        showingFavs = false;
        renderCategories();
        renderChannels(fullData[index].samples);
    }

    function showSection(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(type === 'favs') {
            showingFavs = true;
            document.querySelectorAll('.tab')[1].classList.add('active');
            renderChannels(favorites);
        } else {
            document.querySelectorAll('.tab')[0].classList.add('active');
            loadCategory(currentCat);
        }
    }

    function renderChannels(channels) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = '';
        channels.forEach((ch, index) => {
            const isFav = favorites.some(f => f.uri === ch.uri);
            const num = (index + 1).toString().padStart(3, '0');
            
            const row = document.createElement('div');
            row.className = 'channel-row';
            row.innerHTML = `
                <div class="channel-number">${num}</div>
                <img class="channel-logo" src="${ch.icono}" onerror="this.src='https://via.placeholder.com/40/000/39ff14?text=TV'">
                <div class="channel-info">
                    <div class="channel-name">${ch.name}</div>
                    <div class="channel-sub">En vivo</div>
                </div>
                <div class="fav-star ${isFav?'is-fav':''}" onclick="toggleFav(event, '${ch.uri}')">★</div>
            `;
            row.onclick = () => playChannel(ch);
            grid.appendChild(row);
        });
    }

    function toggleFav(event, uri) {
        event.stopPropagation();
        let channelObj;
        fullData.forEach(cat => {
            const found = cat.samples.find(s => s.uri === uri);
            if(found) channelObj = found;
        });

        const idx = favorites.findIndex(f => f.uri === uri);
        if(idx > -1) favorites.splice(idx, 1);
        else if(channelObj) favorites.push(channelObj);

        localStorage.setItem('vicion_favs', JSON.stringify(favorites));
        if(showingFavs) renderChannels(favorites);
        else loadCategory(currentCat);
    }

    async function playChannel(ch) {
        localStorage.setItem('vicion_last', JSON.stringify(ch));
        player.configure({ drm: { clearKeys: {} } });
        if (ch.drm_license_uri) {
            const [id, key] = ch.drm_license_uri.split(':');
            player.configure({ drm: { clearKeys: { [id]: key } } });
        }
        try { await player.load(ch.uri); videoElement.play(); } catch (e) {}
    }

    function filterChannels(term) {
        const list = showingFavs ? favorites : fullData[currentCat].samples;
        const filtered = list.filter(ch => ch.name.toLowerCase().includes(term.toLowerCase()));
        renderChannels(filtered);
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
