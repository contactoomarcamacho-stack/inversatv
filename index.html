            <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIPTV Web Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #161616;
            --accent: #ff0000;
            --text: #ffffff;
            --card-bg: #1e1e1e;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Barra Lateral Estilo App */
        #sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .sidebar-header h2 {
            color: var(--accent);
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }

        #categories-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .category-item {
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.3s;
            font-size: 14px;
            color: #bbb;
        }

        .category-item:hover {
            background: #252525;
            color: #fff;
        }

        .category-item.active {
            background: var(--accent);
            color: white;
            font-weight: bold;
        }

        /* Área de Contenido */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Reproductor con aspecto de TV */
        #player-wrapper {
            background: #000;
            width: 100%;
            height: 55vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        video {
            height: 100%;
            width: 100%;
            max-width: 1000px;
            outline: none;
        }

        /* Grilla de Canales (como en tu foto) */
        #channel-grid {
            flex: 1;
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            overflow-y: auto;
            background: var(--bg);
        }

        .channel-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 5px 15px rgba(255,0,0,0.2);
        }

        .channel-card img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .channel-card p {
            margin: 0;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h2>KIPTV WEB</h2>
    </div>
    <div id="categories-list"></div>
</div>

<div id="main">
    <div id="player-wrapper">
        <video id="video" controls autoplay></video>
    </div>
    <div id="channel-grid"></div>
</div>

<script>
    let player;
    let videoElement;
    let fullData = [];
    // PROXY para saltar bloqueo CORS
    const proxy = "https://corsproxy.io/?"; 

    async function initApp() {
        videoElement = document.getElementById('video');
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            alert('Tu navegador no soporta este reproductor.');
            return;
        }

        player = new shaka.Player(videoElement);
        player.addEventListener('error', (e) => console.error('Error de Shaka:', e.detail));

        try {
            // Intentamos cargar tu JSON
            const response = await fetch('channels.json');
            fullData = await response.json();
            renderCategories();
            if(fullData.length > 0) loadCategory(0);
        } catch (e) {
            console.error(e);
            alert("Error: Asegúrate de que 'channels.json' esté en la misma carpeta que este archivo.");
        }
    }

    function renderCategories() {
        const container = document.getElementById('categories-list');
        fullData.forEach((cat, index) => {
            const div = document.createElement('div');
            div.className = 'category-item';
            div.innerText = cat.name;
            div.onclick = () => loadCategory(index, div);
            container.appendChild(div);
        });
    }

    function loadCategory(index, element) {
        document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');

        const grid = document.getElementById('channel-grid');
        grid.innerHTML = '';
        
        const category = fullData[index];
        category.samples.forEach(channel => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <img src="${channel.icono}" onerror="this.src='https://via.placeholder.com/100?text=TV'">
                <p>${channel.name}</p>
            `;
            card.onclick = () => playChannel(channel);
            grid.appendChild(card);
        });
    }

    async function playChannel(channel) {
        // Configuración DRM ClearKey
        if (channel.drm_license_uri) {
            const [keyId, key] = channel.drm_license_uri.split(':');
            player.configure({
                drm: { clearKeys: { [keyId]: key } }
            });
        }

        try {
            // Aplicamos el proxy a la URL del canal
            const finalUri = proxy + encodeURIComponent(channel.uri);
            await player.load(finalUri);
            videoElement.play();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (e) {
            console.error('Error:', e);
            alert("No se pudo reproducir el canal. Prueba activando una extensión de 'Allow CORS' en tu navegador.");
        }
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
