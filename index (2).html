<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Vicion TV</title>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.compiled.js"></script>
<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; }
video { width:100%; height:100vh; object-fit:contain; }
#channelList {
    position:absolute; top:0; left:0; width:300px; height:100%;
    overflow:auto; background:rgba(0,0,0,0.9); padding:10px;
}
.category { margin-top:10px; font-weight:bold; color:#ff2a2a; }
.channel {
    display:flex; align-items:center; gap:10px; padding:6px;
    cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.1);
}
.channel:hover { background:rgba(255,255,255,0.1); }
.channel img { width:40px; height:40px; object-fit:contain; }
.channel.active { background:rgba(255,42,42,0.3); }
</style>
</head>
<body>

<video id="video" controls autoplay></video>
<div id="channelList"></div>

<script>
// ✅ IMPORTANTE: instalar polyfills primero
shaka.polyfill.installAll();

const video = document.getElementById('video');
const player = new shaka.Player(video);

// ✅ Configuración global del player
player.configure({
    streaming: {
        bufferingGoal: 30,
        rebufferingGoal: 5,
        retryParameters: {
            maxAttempts: 5,
            baseDelay: 1000,
            backoffFactor: 2,
        }
    },
    manifest: {
        retryParameters: {
            maxAttempts: 5,
            baseDelay: 1000,
        }
    }
});

// ✅ Log de errores detallado en consola
player.addEventListener('error', (event) => {
    const e = event.detail;
    console.error(`Shaka Error — Código: ${e.code} | Categoría: ${e.category} | Mensaje: ${e.message}`);
});

let channelsData = [];

async function loadChannels() {
    try {
        const res = await fetch('channels.json');
        channelsData = await res.json();
        renderChannels();
    } catch(e) {
        console.error("No se pudo cargar channels.json:", e);
    }
}

function renderChannels() {
    const list = document.getElementById('channelList');
    list.innerHTML = '';

    channelsData.forEach(cat => {
        const title = document.createElement('div');
        title.className = 'category';
        title.innerText = cat.name;
        list.appendChild(title);

        cat.samples.forEach(ch => {
            const item = document.createElement('div');
            item.className = 'channel';
            item.innerHTML = `
                <img src="${ch.icono || ''}" onerror="this.style.visibility='hidden'">
                <span>${ch.name}</span>
            `;
            item.onclick = () => {
                // Marcar canal activo
                document.querySelectorAll('.channel').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                loadChannel(ch);
            };
            list.appendChild(item);
        });
    });
}

async function loadChannel(channel) {
    try {
        await player.unload();

        // ✅ Resetear DRM siempre antes de cargar
        player.configure({ drm: {} });

        if (channel.drm_scheme === 'clearkey' && channel.drm_license_uri) {
            const [keyId, key] = channel.drm_license_uri.split(':');
            player.configure({
                drm: {
                    clearKeys: { [keyId]: key }
                }
            });
        }

        await player.load(channel.uri);
        video.play();
        console.log("✅ Canal cargado:", channel.name);

    } catch (e) {
        console.error("❌ Error cargado canal:", channel.name, "| Código:", e.code, "| Msg:", e.message);
        alert(`No se pudo cargar "${channel.name}"\nError ${e.code}: ${e.message}`);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadChannels();
});
</script>
</body>
</html>
